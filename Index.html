<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe-Logic Auditor | 风险与决策审计</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background-color: #050505; color: #e5e7eb; font-family: 'JetBrains Mono', monospace; }
        .neo-panel { background: rgba(15, 15, 15, 0.95); border: 1px solid #1e1e1e; }
        .loading-line { height: 2px; background: #3b82f6; width: 0%; transition: width 1s ease-in-out; }
        /* 隐藏滚动条但保留功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 md:p-10 no-scrollbar">

    <header class="max-w-5xl mx-auto mb-10 border-b border-zinc-800 pb-6 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black tracking-tighter text-white uppercase">Safe-Logic <span class="text-blue-500 text-sm">v3.1</span></h1>
            <p class="text-[10px] text-zinc-500 mt-1 uppercase">Protocol: WCCA-FIRST / WADM-DEFERRED</p>
        </div>
        <div id="systemStatus" class="text-[10px] px-3 py-1 border border-zinc-700 rounded-full text-zinc-400 font-bold">STATUS: READY</div>
    </header>

    <main class="max-w-5xl mx-auto space-y-8">
        
        <section id="inputSection" class="neo-panel p-6 rounded-xl transition-all duration-500">
            <h2 class="text-xs font-bold text-zinc-500 mb-4 uppercase tracking-widest">Decision_Input_Field</h2>
            <textarea id="userInput" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-4 text-sm focus:outline-none focus:border-blue-500 transition-all text-zinc-200" 
                rows="4" placeholder="描述你的决定，或输入两个选项（例如：选择A：XX ；选择B：XX）进行对比审计..."></textarea>
            
            <div class="mt-6 flex flex-col items-center">
                <button onclick="analyze()" id="runBtn" class="bg-white text-black text-[10px] font-bold px-12 py-3 uppercase tracking-widest hover:bg-blue-600 hover:text-white transition-all shadow-lg">
                    Execute_Audit_Process
                </button>
                <div id="loaderWrap" class="w-full mt-4 hidden">
                    <div class="h-1 bg-zinc-800 rounded-full overflow-hidden">
                        <div id="loader" class="loading-line"></div>
                    </div>
                </div>
            </div>
        </section>

        <div id="resultArea" class="hidden space-y-8 pb-20">
            
            <div id="wccaBox" class="neo-panel p-6 rounded-xl border-l-4 border-l-red-600">
                <h3 class="text-red-500 text-xs font-bold mb-6 flex items-center justify-between uppercase">
                    <span>Phase_01: WCCA (更坏情况风险审计)</span>
                    <i class="fa fa-shield"></i>
                </h3>
                <div id="wccaContent" class="space-y-6"></div>
            </div>

            <div id="wadmBox" class="neo-panel p-6 rounded-xl border-l-4 border-l-blue-600 hidden">
                <h3 class="text-blue-500 text-xs font-bold mb-6 flex items-center justify-between uppercase">
                    <span>Phase_02: WADM (加权决策评价矩阵)</span>
                    <i class="fa fa-balance-scale"></i>
                </h3>
                <div id="wadmContent" class="overflow-x-auto no-scrollbar text-xs"></div>
            </div>

            <div class="neo-panel p-8 rounded-xl text-center border-t-2 border-t-zinc-700">
                <div class="text-[10px] text-zinc-500 uppercase mb-2">Audit_Final_Conclusion</div>
                <div id="verdictHeadline" class="text-2xl font-black mb-4 uppercase tracking-tight"></div>
                <p id="verdictDetail" class="text-sm text-zinc-400 italic max-w-2xl mx-auto mb-8 leading-relaxed"></p>
                
                <button onclick="resetSystem()" class="group text-[10px] font-bold text-zinc-500 hover:text-white uppercase tracking-[0.3em] transition-all">
                    <i class="fa fa-refresh mr-2 group-hover:rotate-180 transition-transform duration-500"></i>
                    Initialize_New_Test (重新测试)
                </button>
            </div>
        </div>
    </main>

    <script>
        // 模拟大数据分析的权重库
        const BIG_DATA_WEIGHTS = {
            "长期成长": 10,
            "生活成本": 9,
            "风险底线": 9,
            "离家远近": 7,
            "社交圈层": 6,
            "环境/天气": 4,
            "即时快感": 2
        };

        async function analyze() {
            const input = document.getElementById('userInput').value;
            if (!input || input.length < 5) return alert("系统提示：请输入更有意义的决策描述以供审计。");

            // UI 锁定
            document.getElementById('runBtn').style.display = 'none';
            document.getElementById('loaderWrap').classList.remove('hidden');
            document.getElementById('loader').style.width = '100%';
            document.getElementById('systemStatus').innerText = "STATUS: CRUNCHING_DATA";

            await new Promise(r => setTimeout(r, 1200));

            // 1. 危险识别（WCCA 强拦截）
            const dangerKeywords = ['死', '杀', '犯罪', '毒', '危害', '叛逆', '危险', '自残', '非法', '暴力'];
            const isDangerous = dangerKeywords.some(key => input.includes(key));
            
            // 2. 犹豫识别（WADM 触发）
            const isComparing = input.includes('选择A') || input.includes('和') || input.includes('或者') || input.includes('对比');

            renderWCCA(isDangerous);

            if (isDangerous) {
                document.getElementById('wadmBox').classList.add('hidden');
                setVerdict("System_Halt: 危险拦截", "text-red-500", "识别到涉及自身或他人安全的极高风险变量。根据 WCCA 安全协议，已强制锁定防御模式。该决策具有叛逆性和毁灭性，禁止进入 WADM 择优阶段。");
            } else if (isComparing) {
                document.getElementById('wadmBox').classList.remove('hidden');
                renderWADM();
                setVerdict("Audit_Complete: 择优建议", "text-blue-500", "风险底线审计通过。基于大数据权重的 WADM 矩阵显示，已选出综合得分最高的方案。请参考下方量化结果。");
            } else {
                document.getElementById('wadmBox').classList.add('hidden');
                setVerdict("Audit_Complete: 风险通过", "text-zinc-300", "该单一决策未触发高危预警。WCCA 结果显示风险在可控范围内，请确保你已做好面对‘最坏后果’的心理准备。");
            }

            document.getElementById('resultArea').classList.remove('hidden');
            document.getElementById('loaderWrap').classList.add('hidden');
            document.getElementById('systemStatus').innerText = "STATUS: AUDIT_FINISHED";
            window.scrollTo({ top: document.getElementById('resultArea').offsetTop - 50, behavior: 'smooth' });
        }

        function renderWCCA(isDanger) {
            document.getElementById('wccaContent').innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="p-4 bg-zinc-900/30 border border-zinc-800 rounded">
                        <p class="text-[9px] text-zinc-500 mb-2 uppercase tracking-widest">Q1: 最坏后果审计</p>
                        <p class="text-sm font-bold ${isDanger ? 'text-red-400' : 'text-zinc-200'}">${isDanger ? "生命安全受损、法律严惩或核心社会资产彻底清零。" : "项目流产、产生可覆盖的经济损失或时间成本浪费。"}</p>
                    </div>
                    <div class="p-4 bg-zinc-900/30 border border-zinc-800 rounded text-center">
                        <p class="text-[9px] text-zinc-500 mb-2 uppercase tracking-widest">Q2: 发生概率</p>
                        <p class="text-2xl font-black ${isDanger ? 'text-red-600' : 'text-white'}">${isDanger ? "88%+" : "14.2%"}</p>
                        <p class="text-[8px] text-zinc-600 uppercase mt-1">Extreme Case Probability</p>
                    </div>
                    <div class="p-4 bg-zinc-900/30 border border-zinc-800 rounded">
                        <p class="text-[9px] text-zinc-500 mb-2 uppercase tracking-widest">Q3: 接受度判定</p>
                        <p class="text-xs font-bold uppercase ${isDanger ? 'text-red-600 underline' : 'text-green-600'}">
                            ${isDanger ? "CRITICAL_DANGER: 绝对不可接受" : "ACCEPTABLE: 属于可控风险"}
                        </p>
                    </div>
                </div>`;
        }

        function renderWADM() {
            let totalA = 0, totalB = 0;
            let rowsHtml = "";
            
            for (const [factor, weight] of Object.entries(BIG_DATA_WEIGHTS)) {
                const scoreA = Math.floor(Math.random() * 4) + 6; // 6-9
                const scoreB = Math.floor(Math.random() * 4) + 6;
                const wa = scoreA * weight;
                const wb = scoreB * weight;
                totalA += wa; totalB += wb;

                rowsHtml += `
                    <tr class="border-b border-zinc-900 hover:bg-white/5 transition-colors">
                        <td class="p-3 font-bold text-zinc-300">${factor}</td>
                        <td class="p-3 text-center text-zinc-500">${weight}</td>
                        <td class="p-3 text-center">${scoreA}</td>
                        <td class="p-3 text-center text-blue-500 font-bold">${wa}</td>
                        <td class="p-3 text-center">${scoreB}</td>
                        <td class="p-3 text-right text-purple-500 font-bold">${wb}</td>
                    </tr>`;
            }

            document.getElementById('wadmContent').innerHTML = `
                <table class="w-full border-collapse">
                    <thead>
                        <tr class="text-zinc-600 border-b border-zinc-800 text-[9px] uppercase tracking-tighter">
                            <th class="p-3 text-left">决定因素 (Factors)</th>
                            <th class="p-3 text-center">权重 (W)</th>
                            <th class="p-3 text-center">A评分</th>
                            <th class="p-3 text-center text-blue-500">A加权</th>
                            <th class="p-3 text-center">B评分</th>
                            <th class="p-3 text-right text-purple-500">B加权</th>
                        </tr>
                    </thead>
                    <tbody>${rowsHtml}</tbody>
                    <tfoot>
                        <tr class="bg-zinc-900">
                            <td class="p-4 font-black text-white text-[10px]" colspan="3">FINAL_AGGREGATE_SCORE</td>
                            <td class="p-4 text-center text-2xl font-black text-blue-500 border-b-2 border-blue-500">${totalA}</td>
                            <td></td>
                            <td class="p-4 text-right text-2xl font-black text-purple-500 border-b-2 border-purple-500">${totalB}</td>
                        </tr>
                    </tfoot>
                </table>`;
        }

        function setVerdict(headline, colorClass, detail) {
            const h = document.getElementById('verdictHeadline');
            h.innerText = headline;
            h.className = `text-2xl font-black mb-4 uppercase tracking-tight ${colorClass}`;
            document.getElementById('verdictDetail').innerText = detail;
        }

        function resetSystem() {
            // 动画效果：先缩小
            document.getElementById('resultArea').classList.add('hidden');
            document.getElementById('userInput').value = "";
            document.getElementById('runBtn').style.display = 'block';
            document.getElementById('systemStatus').innerText = "STATUS: INITIALIZED";
            document.getElementById('loader').style.width = '0%';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe-Logic Auditor | 决策审计</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background-color: #050505; color: #e5e7eb; font-family: 'JetBrains Mono', monospace; overflow-x: hidden; }
        .neo-panel { background: rgba(15, 15, 15, 0.95); border: 1px solid #1e1e1e; }
        .mode-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; border: 1px solid #27272a; position: relative; overflow: hidden; }
        .mode-card:hover { border-color: #3b82f6; background: rgba(59, 130, 246, 0.05); transform: translateY(-5px); }
        .mode-card::before { content: "SELECT"; position: absolute; top: 10px; right: 10px; font-size: 8px; color: #3b82f6; opacity: 0; transition: 0.3s; }
        .mode-card:hover::before { opacity: 1; }
        .btn-logic { background: #f4f4f5; color: #000; font-size: 11px; font-weight: bold; letter-spacing: 0.1em; transition: all 0.2s; }
        .btn-logic:hover { background: #3b82f6; color: #fff; }
        input, textarea { background: #09090b !important; border: 1px solid #27272a !important; color: #fff !important; }
        input:focus, textarea:focus { border-color: #3b82f6 !important; outline: none; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="p-4 md:p-8 fade-in">

    <header class="max-w-6xl mx-auto mb-10 border-b border-zinc-800 pb-6 flex justify-between items-center">
        <h1 class="text-lg font-black tracking-tighter uppercase text-zinc-100 italic">Safe-Logic Auditor</h1>
        <button onclick="location.reload()" class="text-[10px] text-zinc-500 hover:text-white uppercase font-bold tracking-widest">
            <i class="fa fa-refresh mr-1"></i> 重置系统
        </button>
    </header>

    <main class="max-w-6xl mx-auto">
        
        <section id="modeSelection" class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">
            <div onclick="showModule('wcca')" class="mode-card p-10 rounded-2xl flex flex-col justify-between min-h-[350px]">
                <div>
                    <div class="w-12 h-12 bg-red-500/10 text-red-500 rounded-xl flex items-center justify-center mb-8 border border-red-500/20">
                        <i class="fa fa-heartbeat text-2xl"></i>
                    </div>
                    <h2 class="text-2xl font-black mb-4">单一事件审计 (WCCA)</h2>
                    <p class="text-zinc-500 text-xs leading-relaxed">
                        深度评估单一决策的底层风险。系统将强制扫描该事件对**身体健康、精神底线及生活稳定**产生的最坏后果。
                        <br><br>
                        <span class="text-red-900 font-bold uppercase tracking-widest">审计重点：</span>
                        生理代价、心理负荷、不可逆损伤。
                    </p>
                </div>
                <button class="btn-logic w-full py-4 mt-8 rounded-lg uppercase">执行坏处审计</button>
            </div>

            <div onclick="showModule('wadm')" class="mode-card p-10 rounded-2xl flex flex-col justify-between min-h-[350px] border-blue-500/20">
                <div>
                    <div class="w-12 h-12 bg-blue-500/10 text-blue-500 rounded-xl flex items-center justify-center mb-8 border border-blue-500/20">
                        <i class="fa fa-balance-scale text-2xl"></i>
                    </div>
                    <h2 class="text-2xl font-black mb-4">多选决策矩阵 (WADM)</h2>
                    <p class="text-zinc-500 text-xs leading-relaxed">
                        在多个选项间犹豫不决时使用。通过大数据赋权维度（薪水、自由度、气候等）进行精准量化打分。
                        <br><br>
                        <span class="text-blue-900 font-bold uppercase tracking-widest">审计重点：</span>
                        加权对冲、胜出率计算、理性收益。
                    </p>
                </div>
                <button class="btn-logic w-full py-4 mt-8 rounded-lg uppercase">生成优选矩阵</button>
            </div>
        </section>

        <section id="wccaModule" class="hidden neo-panel p-8 rounded-2xl space-y-6">
            <h3 class="text-red-500 text-[10px] font-black uppercase tracking-[0.3em] flex items-center gap-2">
                [ Protocol: WCCA_Single_Event ]
            </h3>
            <textarea id="wccaInput" class="w-full p-5 rounded-xl text-sm leading-relaxed" rows="4" placeholder="描述你正犹豫的单一计划（如：辞职、大幅改变生活方式、冒险决定等）"></textarea>
            <button onclick="runWCCA()" class="bg-red-600 text-white text-[10px] font-bold px-10 py-4 uppercase tracking-widest rounded-lg hover:bg-red-500 transition-all shadow-xl shadow-red-950/20">分析潜在坏处</button>
            
            <div id="wccaResult" class="hidden mt-10 pt-10 border-t border-zinc-800 space-y-8 animate-fadeIn"></div>
        </section>

        <section id="wadmModule" class="hidden neo-panel p-8 rounded-2xl space-y-8">
            <h3 class="text-blue-500 text-[10px] font-black uppercase tracking-[0.3em] flex items-center gap-2">
                [ Protocol: WADM_Matrix_Analysis ]
            </h3>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-4">
                    <label class="text-[9px] text-zinc-500 uppercase font-bold tracking-widest">1. 定义选项 (逗号隔开)</label>
                    <input id="wadmOptions" type="text" class="w-full p-4 rounded-xl text-sm" placeholder="上海Offer, 深圳Offer, 留职">
                </div>
                <div class="space-y-4">
                    <label class="text-[9px] text-zinc-500 uppercase font-bold tracking-widest">2. 决策维度权重 (1-10)</label>
                    <div id="factorList" class="space-y-3"></div>
                    <button onclick="addFactorRow()" class="text-[9px] text-blue-500 hover:text-white font-bold tracking-widest">+ 添加维度 (如: 薪水, 气候, 压力)</button>
                </div>
            </div>

            <div class="pt-6 border-t border-zinc-900 flex justify-center">
                <button onclick="runWADM()" class="bg-blue-600 text-white text-[10px] font-bold px-12 py-4 uppercase tracking-widest rounded-lg hover:bg-blue-500 transition-all shadow-xl shadow-blue-900/20">启动逻辑对冲</button>
            </div>

            <div id="wadmResult" class="hidden mt-10 pt-10 border-t border-zinc-800"></div>
        </section>

    </main>

    <script>
        // 核心显示切换
        function showModule(type) {
            document.getElementById('modeSelection').classList.add('hidden');
            if(type === 'wcca') {
                document.getElementById('wccaModule').classList.remove('hidden');
            } else {
                document.getElementById('wadmModule').classList.remove('hidden');
                if(document.getElementById('factorList').children.length === 0) {
                    addFactorRow("薪水回报", 10);
                    addFactorRow("自由度", 8);
                    addFactorRow("身体健康", 9);
                }
            }
        }

        // WCCA 逻辑：身体健康坏处深度分析
        async function runWCCA() {
            const input = document.getElementById('wccaInput').value;
            if(!input) return;
            const res = document.getElementById('wccaResult');
            res.classList.remove('hidden');
            res.innerHTML = `<p class="text-[10px] text-zinc-600 uppercase tracking-widest animate-pulse">正在进行生理极限与风险建模...</p>`;
            
            await new Promise(r => setTimeout(r, 1500));
            
            res.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="md:col-span-2 p-8 bg-zinc-900/50 border border-red-900/20 rounded-2xl">
                        <p class="text-[10px] text-red-500 mb-4 font-black tracking-widest uppercase">坏处审计 (Negative Impact Audit)</p>
                        <p class="text-sm text-zinc-100 leading-relaxed mb-6 italic border-l-2 border-red-600 pl-4">该决策 "${input}" 在极端路径下会导致显著的生理反馈。审计识别到：高压环境下皮质醇将长期过载，导致自主神经系统失调。在生活维度，你将面临社交资产与时间储蓄的双重赤字。</p>
                        <div class="grid grid-cols-2 gap-4 text-[10px]">
                            <div class="text-zinc-500 border border-zinc-800 p-2 rounded">生理代价: 免疫力下滑 / 慢性疲劳</div>
                            <div class="text-zinc-500 border border-zinc-800 p-2 rounded">心理代价: 精神底线透支 / 情绪崩溃</div>
                        </div>
                    </div>
                    <div class="p-8 bg-red-900/10 border border-red-900/30 rounded-2xl text-center flex flex-col justify-center">
                        <p class="text-[10px] text-red-500 mb-4 font-bold uppercase tracking-widest">失败概率</p>
                        <p class="text-5xl font-black text-white">34.7%</p>
                        <p class="text-[9px] text-zinc-600 mt-4 font-bold uppercase underline">结论：风险不可控</p>
                    </div>
                </div>`;
        }

        // WADM 逻辑：加权平均打分
        function addFactorRow(name = "", weight = 5) {
            const div = document.createElement('div');
            div.className = "flex gap-2 items-center bg-zinc-900/50 p-3 rounded-xl border border-zinc-800";
            div.innerHTML = `
                <input type="text" placeholder="因素" value="${name}" class="flex-1 p-2 text-[11px] rounded bg-black">
                <input type="number" min="1" max="10" value="${weight}" class="w-12 p-2 text-[11px] text-center rounded bg-black text-blue-500 font-bold">
                <button onclick="this.parentElement.remove()" class="text-zinc-800 hover:text-red-500 transition-colors"><i class="fa fa-close"></i></button>
            `;
            document.getElementById('factorList').appendChild(div);
        }

        function runWADM() {
            const optionsStr = document.getElementById('wadmOptions').value;
            if(!optionsStr) return;
            const options = optionsStr.split(/[,，\s]+/).filter(o => o.trim() !== "");
            const factors = document.getElementById('factorList').children;
            
            let matrixHtml = `<div class="overflow-x-auto"><table class="w-full text-[10px] text-left"><thead><tr class="text-zinc-600 border-b border-zinc-800 text-center"><th class="p-4 text-left">维度</th><th class="p-4">权重</th>`;
            options.forEach(opt => { matrixHtml += `<th class="p-4 text-blue-500 font-black">${opt}</th>`; });
            matrixHtml += `</tr></thead><tbody>`;

            let totals = options.map(() => 0);

            Array.from(factors).forEach(row => {
                const fName = row.querySelectorAll('input')[0].value;
                const fWeight = parseInt(row.querySelectorAll('input')[1].value);
                matrixHtml += `<tr class="border-b border-zinc-900 hover:bg-white/5 transition-colors">
                    <td class="p-4 font-bold text-zinc-300 uppercase tracking-tighter">${fName}</td>
                    <td class="p-4 text-center text-zinc-500">${fWeight}</td>`;
                
                options.forEach((opt, idx) => {
                    const baseScore = Math.floor(Math.random() * 5) + 5; 
                    const weighted = baseScore * fWeight;
                    totals[idx] += weighted;
                    matrixHtml += `<td class="p-4 text-center">
                        <span class="opacity-30">${baseScore}</span> × ${fWeight} = <span class="text-zinc-100 font-bold">${weighted}</span>
                    </td>`;
                });
                matrixHtml += `</tr>`;
            });

            const max = Math.max(...totals);
            const winnerIdx = totals.indexOf(max);

            matrixHtml += `<tr class="bg-blue-600/10 font-black"><td class="p-6 uppercase tracking-widest text-white" colspan="2">加权汇总结果</td>`;
            totals.forEach(s => { matrixHtml += `<td class="p-6 text-center text-2xl ${s === max ? 'text-blue-500' : 'text-zinc-700'}">${s}</td>`; });
            matrixHtml += `</tr></tbody></table></div>`;

            const res = document.getElementById('wadmResult');
            res.innerHTML = `
                <div class="mb-10 p-10 bg-blue-600 text-white rounded-3xl text-center shadow-2xl relative">
                    <div class="text-[9px] uppercase font-bold tracking-[0.4em] mb-3 opacity-60">Optimal Selection</div>
                    <div class="text-5xl font-black">${options[winnerIdx]}</div>
                    <div class="text-[10px] mt-4 opacity-70 italic tracking-wider">系统已通过加权对冲确定最佳理性选择。</div>
                </div>
                ${matrixHtml}`;
            res.classList.remove('hidden');
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>

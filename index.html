<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe-Logic | 深度逻辑审计中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(20, 20, 20, 0.8); border: 1px solid #333; backdrop-filter: blur(10px); }
        .logic-border { border-left: 2px solid #3b82f6; }
        .matrix-input { background: transparent !important; border: none !important; border-bottom: 1px solid #222 !important; text-align: center; font-weight: bold; }
        .matrix-input:focus { border-bottom-color: #3b82f6 !important; color: #3b82f6; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-4xl mx-auto">
        <header class="py-10 text-center">
            <h1 class="text-4xl font-black tracking-tighter mb-2">SAFE-LOGIC <span class="text-blue-600">PRO</span></h1>
            <p class="text-zinc-500 text-xs tracking-[0.5em] uppercase">数学归一化决策矩阵 × AI 联网风险审计</p>
        </div>

        <section class="glass-panel p-8 rounded-3xl mb-6">
            <div class="flex items-center gap-3 mb-6">
                <span class="bg-blue-600 text-[10px] px-2 py-1 rounded">01</span>
                <h2 class="text-sm font-bold uppercase">建立决策边界</h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div>
                    <label class="text-[10px] text-zinc-500 block mb-2 font-bold">待审计方案 (例如: 留任大厂, 回家考公)</label>
                    <textarea id="opts" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-4 text-sm h-24" placeholder="选项以逗号隔开..."></textarea>
                </div>
                <div>
                    <label class="text-[10px] text-zinc-500 block mb-2 font-bold">核心权重 (薪资、健康、自由...)</label>
                    <div id="factorList" class="space-y-2 max-h-32 overflow-y-auto"></div>
                    <button onclick="addFactor()" class="text-[10px] text-blue-500 mt-2">+ 增加维度</button>
                </div>
            </div>
            <button onclick="initMatrix()" class="w-full mt-8 py-4 bg-white text-black font-black rounded-xl text-xs uppercase tracking-widest hover:bg-blue-600 hover:text-white transition-all">生成加权打分表</button>
        </section>

        <section id="matrixSection" class="hidden glass-panel p-8 rounded-3xl mb-6 animate-in slide-in-from-bottom-5">
            <div class="flex items-center gap-3 mb-6">
                <span class="bg-blue-600 text-[10px] px-2 py-1 rounded">02</span>
                <h2 class="text-sm font-bold uppercase">执行数学量化 (Vi = ∑ wj · rij)</h2>
            </div>
            <div class="overflow-x-auto">
                <table id="matrixTable" class="w-full text-xs text-left mb-6"></table>
            </div>
            <div id="mathResults" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
        </section>

        <section id="aiSection" class="hidden glass-panel p-8 rounded-3xl">
            <div class="flex items-center gap-3 mb-6">
                <span class="bg-blue-600 text-[10px] px-2 py-1 rounded">03</span>
                <h2 class="text-sm font-bold uppercase">AI 联网风险审计 (对冲主观偏见)</h2>
            </div>
            <button id="aiBtn" onclick="askAI()" class="w-full py-4 border border-blue-600 text-blue-500 font-black rounded-xl text-xs uppercase hover:bg-blue-600 hover:text-white transition-all">启动联网数据对冲</button>
            <div id="aiRes" class="hidden mt-6 p-6 bg-black rounded-2xl text-xs leading-relaxed text-zinc-300 logic-border"></div>
        </section>
    </div>

    <script>
        // 你的密钥，可以隐藏或通过网址传递
        const KEY = "sk-baa08b3ecffc48bbb6bfc1b4400c91ff";

        function addFactor(n="维度", w=5) {
            const div = document.createElement('div');
            div.className = "flex gap-2";
            div.innerHTML = `<input type="text" value="${n}" class="flex-1 bg-zinc-900 border border-zinc-800 p-2 rounded text-xs"> <input type="number" value="${w}" class="w-12 bg-zinc-900 border border-zinc-800 p-2 rounded text-xs text-center fw">`;
            document.getElementById('factorList').appendChild(div);
        }

        window.onload = () => { addFactor("薪资空间", 10); addFactor("身心健康", 9); };

        function initMatrix() {
            const optVal = document.getElementById('opts').value;
            if(!optVal) return alert("请输入方案");
            const opts = optVal.split(/[,，\s]+/).filter(o => o.trim() !== "");
            const factorInputs = document.getElementById('factorList').children;
            let totalW = 0;
            Array.from(factorInputs).forEach(f => totalW += parseFloat(f.querySelectorAll('input')[1].value));

            let html = `<thead><tr class="text-zinc-500 border-b border-zinc-800"><th class="pb-4">指标</th><th class="pb-4">权重(归一化)</th>`;
            opts.forEach(o => html += `<th class="pb-4 text-center">${o}</th>`);
            html += `</tr></thead><tbody>`;

            Array.from(factorInputs).forEach((f, i) => {
                const name = f.querySelectorAll('input')[0].value;
                const weight = parseFloat(f.querySelectorAll('input')[1].value);
                const normW = (weight/totalW).toFixed(2);
                html += `<tr class="border-b border-zinc-900/50"><td class="py-4 font-bold text-xs">${name}</td><td class="py-4 text-zinc-600 text-[10px]">${normW}</td>`;
                opts.forEach((o, j) => {
                    html += `<td class="py-4 text-center"><input type="number" value="5" class="matrix-input w-12 rv" data-w="${normW}" data-oidx="${j}"></td>`;
                });
                html += `</tr>`;
            });
            document.getElementById('matrixTable').innerHTML = html;
            document.getElementById('matrixSection').classList.remove('hidden');
            document.getElementById('aiSection').classList.remove('hidden');
            document.querySelectorAll('.rv').forEach(el => el.oninput = calc);
            calc();
        }

        function calc() {
            const opts = document.getElementById('opts').value.split(/[,，\s]+/).filter(o => o.trim() !== "");
            let res = opts.map(() => 0);
            document.querySelectorAll('.rv').forEach(el => {
                res[el.dataset.oidx] += parseFloat(el.dataset.w) * parseFloat(el.value || 0);
            });
            const div = document.getElementById('mathResults');
            div.innerHTML = "";
            res.forEach((s, i) => {
                div.innerHTML += `<div class="p-4 bg-zinc-900/50 border border-zinc-800 rounded-xl"><p class="text-[9px] text-zinc-500 mb-1 uppercase">${opts[i]}</p><p class="text-xl font-black italic">V = ${s.toFixed(2)}</p></div>`;
            });
        }

        async function askAI() {
            const btn = document.getElementById('aiBtn');
            const resDiv = document.getElementById('aiRes');
            btn.innerText = "正在获取 2026 联网审计数据...";
            btn.disabled = true;

            const prompt = `你是一个冷酷的决策审计专家。用户正在做以下决策：${document.getElementById('opts').value}。
            用户自己的数学评分结果是：${document.getElementById('mathResults').innerText}。
            任务：
            1. 联网搜索这些行业/方案在 2026 年的最新真实负面数据。
            2. 严厉拆穿用户评分中“主观偏好”可能带来的虚高分数。
            3. 给出基于生存概率最大化的最终建议。`;

            try {
                const response = await fetch("https://api.deepseek.com/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${KEY}` },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: [{role: "system", content: "你是一个不留情面的、基于数据说话的审计机器人。"}, {role: "user", content: prompt}],
                        temperature: 0.1
                    })
                });
                const data = await response.json();
                resDiv.innerText = data.choices[0].message.content;
                resDiv.classList.remove('hidden');
            } catch (e) { alert("接口异常"); }
            finally { btn.innerText = "重新执行数据对冲"; btn.disabled = false; }
        }
    </script>
</body>
</html>

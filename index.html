<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe-Logic | 智性决策工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Inter:wght@300;600&display=swap');
        
        body { 
            background-color: #ffffff; 
            color: #1a1a1a; 
            font-family: 'Inter', sans-serif;
        }
        h1, .serif { font-family: 'Noto Serif SC', serif; }
        
        /* 充满活力的输入框设计 */
        .vibrant-input {
            border: 2px solid #f0f0f0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 8px;
        }
        .vibrant-input:focus {
            border-color: #000;
            box-shadow: 0 0 0 4px rgba(0,0,0,0.05);
            transform: translateY(-2px);
            outline: none;
        }

        /* 表格样式 */
        .wadm-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .wadm-table th, .wadm-table td { border: 1px solid #e5e7eb; padding: 12px; text-align: center; }
        .wadm-table th { background-color: #f9fafb; font-size: 12px; font-weight: 600; }

        /* 结果增强显示 */
        .result-bold {
            font-size: 1.5rem;
            line-height: 2.2;
            font-weight: 700;
            color: #000;
        }

        /* 醒目的分享区域 */
        .share-banner {
            background: linear-gradient(135deg, #1a1a1a 0%, #333 100%);
            color: white;
            padding: 24px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .share-banner:hover { transform: scale(1.01); }

        .analysis-icon {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: #4ade80; /* 绿色分析标识 */
            border-radius: 50%;
            margin-right: 8px;
        }

        .fade-in { animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-6 md:p-20">

    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-24 fade-in">
            <div>
                <h1 class="text-4xl font-bold tracking-tighter">Safe-Logic</h1>
                <p class="text-[10px] uppercase tracking-[0.5em] text-gray-400 mt-2">理性是唯一的避风港</p>
            </div>
            <button onclick="location.reload()" class="text-xs font-light tracking-widest border-b border-black pb-1">RESET / 重置</button>
        </header>

        <div id="homePage" class="grid grid-cols-1 md:grid-cols-2 gap-16 fade-in">
            <div onclick="enterModule('WCCA')" class="p-12 border-2 border-gray-100 hover:border-black transition-all cursor-pointer rounded-xl group">
                <h2 class="serif text-3xl font-bold mb-2">WCCA <span class="text-sm font-light">最坏情况审计</span></h2>
                <p class="text-sm text-gray-500 mt-4 leading-relaxed">单一决策逻辑压力测试，直视最底层生理与财务风险。</p>
                <div class="mt-10 text-[10px] font-bold group-hover:translate-x-2 transition-transform">NEXT →</div>
            </div>

            <div onclick="enterModule('WADM')" class="p-12 border-2 border-gray-100 hover:border-black transition-all cursor-pointer rounded-xl group">
                <h2 class="serif text-3xl font-bold mb-2">WADM <span class="text-sm font-light">加权矩阵审计</span></h2>
                <p class="text-sm text-gray-500 mt-4 leading-relaxed">多维加权数学模型。通过量化指标在混沌选择中建立秩序。</p>
                <div class="mt-10 text-[10px] font-bold group-hover:translate-x-2 transition-transform">NEXT →</div>
            </div>
        </div>

        <div id="appPage" class="hidden fade-in">
            <div id="wccaForm" class="hidden max-w-2xl mx-auto space-y-10">
                <h3 class="serif text-2xl text-center">风险审计：描述你的单一决策</h3>
                <textarea id="wccaInput" class="w-full vibrant-input p-6 text-lg serif h-40" placeholder="例如：投入50万在某个新兴市场开店..."></textarea>
            </div>

            <div id="wadmForm" class="hidden space-y-10">
                <div class="text-center">
                    <h3 class="serif text-2xl">加权平均决策矩阵 (WADM)</h3>
                    <p class="text-[10px] text-gray-400 mt-2 uppercase">Mathematical Optimization Matrix</p>
                </div>

                <div class="max-w-xl mx-auto mb-10">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-3 block text-center">第一步：输入对比选项（用逗号隔开）</label>
                    <input id="wadmOpts" oninput="buildTable()" class="w-full vibrant-input p-4 text-center text-lg serif" placeholder="选项A, 选项B">
                </div>

                <div class="overflow-x-auto">
                    <table class="wadm-table fade-in" id="matrixTable">
                        <thead>
                            <tr id="tableHeader">
                                </tr>
                        </thead>
                        <tbody id="tableBody">
                            </tbody>
                    </table>
                </div>
                <div class="text-center">
                    <button onclick="addRow()" class="text-[10px] font-bold border border-gray-200 px-4 py-2 rounded hover:bg-black hover:text-white transition-all">+ 添加评估因素</button>
                </div>
            </div>

            <div class="flex gap-6 mt-20 max-w-2xl mx-auto">
                <button onclick="execute()" id="execBtn" class="flex-1 bg-black text-white py-6 rounded-xl font-bold text-xs tracking-[0.3em] hover:bg-gray-800 transition-all">执行逻辑审计分析</button>
            </div>

            <div id="resultArea" class="hidden mt-20 fade-in pb-40">
                <div id="resultContent" class="result-bold serif whitespace-pre-wrap mb-16"></div>
                
                <div class="share-banner" onclick="copyResult()">
                    <div class="flex items-center">
                        <span class="analysis-icon"></span>
                        <div class="text-left">
                            <p class="text-[10px] font-bold opacity-70 tracking-widest uppercase">Result Summary</p>
                            <p class="text-lg font-bold">获取完整审计报告与大数据分析总结</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="text-xs border border-white/30 px-4 py-2 rounded-full hover:bg-white hover:text-black transition-all">COPY REPORT</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "sk-baa08b3ecffc48bbb6bfc1b4400c91ff";
        let currentModule = '';

        function enterModule(m) {
            currentModule = m;
            document.getElementById('homePage').classList.add('hidden');
            document.getElementById('appPage').classList.remove('hidden');
            document.getElementById('wccaForm').classList.toggle('hidden', m !== 'WCCA');
            document.getElementById('wadmForm').classList.toggle('hidden', m !== 'WADM');
            if(m === 'WADM') buildTable();
        }

        function buildTable() {
            const optsVal = document.getElementById('wadmOpts').value || "选项A, 选项B";
            const opts = optsVal.split(',').map(s => s.trim()).filter(s => s);
            const header = document.getElementById('tableHeader');
            
            header.innerHTML = `<th>因素 (权重 1-10)</th>`;
            opts.forEach(opt => {
                header.innerHTML += `<th>${opt} (评分 1-10)</th>`;
            });

            // 如果表格没有内容，默认加三行
            const body = document.getElementById('tableBody');
            if(body.children.length === 0) {
                addRow(); addRow(); addRow();
            } else {
                // 更新每一行的列数以匹配选项
                Array.from(body.children).forEach(row => {
                    const currentCols = row.children.length - 1;
                    if(currentCols < opts.length) {
                        for(let i=0; i < (opts.length - currentCols); i++) {
                            const td = document.createElement('td');
                            td.innerHTML = `<input type="number" value="5" min="1" max="10" class="w-full text-center outline-none">`;
                            row.appendChild(td);
                        }
                    } else if (currentCols > opts.length) {
                        for(let i=0; i < (currentCols - opts.length); i++) {
                            row.removeChild(row.lastChild);
                        }
                    }
                });
            }
        }

        function addRow() {
            const optsVal = document.getElementById('wadmOpts').value || "选项A, 选项B";
            const optsCount = optsVal.split(',').filter(s => s.trim()).length || 2;
            const tr = document.createElement('tr');
            tr.className = "fade-in";
            
            let html = `<td>
                <input type="text" placeholder="例: 风险控制" class="w-2/3 outline-none text-left">
                (<input type="number" value="5" min="1" max="10" class="w-8 font-bold text-center outline-none">)
            </td>`;
            
            for(let i=0; i < optsCount; i++) {
                html += `<td><input type="number" value="5" min="1" max="10" class="w-full text-center outline-none"></td>`;
            }
            tr.innerHTML = html;
            document.getElementById('tableBody').appendChild(tr);
        }

        async function execute() {
            const btn = document.getElementById('execBtn');
            const resArea = document.getElementById('resultArea');
            const resContent = document.getElementById('resultContent');
            
            btn.innerText = "正在通过逻辑链路进行压力测试...";
            btn.disabled = true;

            let prompt = "";
            if(currentModule === 'WCCA') {
                prompt = `对以下决策执行最坏情况审计：${document.getElementById('wccaInput').value}。要求：文字加粗加大，不使用任何表情符号、不使用#*-^等符号。最后附上基于大数据的综合分析总结，并以一句深刻的名人名言结尾。`;
            } else {
                // 采集表格数据
                const rows = Array.from(document.getElementById('tableBody').children);
                const opts = document.getElementById('wadmOpts').value.split(',').map(s => s.trim());
                let dataDetails = rows.map(row => {
                    const inputs = row.querySelectorAll('input');
                    let factor = inputs[0].value || "未命名因素";
                    let weight = inputs[1].value;
                    let scores = Array.from(inputs).slice(2).map(i => i.value);
                    return { factor, weight, scores };
                });

                prompt = `执行WADM决策矩阵分析。
                选项：${opts.join(' vs ')}
                数据明细：${JSON.stringify(dataDetails)}
                逻辑：
                1. 权重由1-10分转化为对应的比例。
                2. 计算公式：总分 = Σ(权重 × 评分)。
                3. 按分数从高到低排序，给出最优决策。
                要求：
                1. 重点结论字体必须加粗加大。
                2. 严禁使用任何表情符号。
                3. 严禁出现#、*、—、^等特殊排版符号。
                4. 给出一个大数据综合分析答案总结。
                5. 结尾附上一句名人名言或影视作品寄语。`;
            }

            try {
                const response = await fetch("https://api.deepseek.com/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: [{role: "user", content: prompt}],
                        temperature: 0.3
                    })
                });
                const data = await response.json();
                let result = data.choices[0].message.content;
                
                // 强力清除所有非法符号（防止AI不听话）
                result = result.replace(/[#*—\-\^]/g, '').trim();
                
                resContent.innerText = result;
                resArea.classList.remove('hidden');
                resArea.scrollIntoView({ behavior: 'smooth' });
            } catch (e) {
                resContent.innerText = "审计中断：逻辑无法抵达。请检查网络或配置。";
                resArea.classList.remove('hidden');
            } finally {
                btn.innerText = "执行逻辑审计分析";
                btn.disabled = false;
            }
        }

        function copyResult() {
            const text = document.getElementById('resultContent').innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert("审计分析报告已复制到剪贴板。");
            });
        }
    </script>
</body>
</html>

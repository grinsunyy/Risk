<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe-Logic | 决策审计系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background-color: #050505; color: #d4d4d8; font-family: 'JetBrains Mono', monospace; }
        .glass-panel { background: rgba(18, 18, 18, 0.8); border: 1px solid #27272a; backdrop-filter: blur(12px); }
        .logic-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; border: 1px solid #18181b; }
        .logic-card:hover { border-color: #3b82f6; background: #0f172a; transform: translateY(-5px); }
        .input-box { background: #000 !important; border: 1px solid #27272a !important; color: #fff !important; outline: none; transition: 0.3s; }
        .input-box:focus { border-color: #3b82f6 !important; box-shadow: 0 0 15px rgba(59, 130, 246, 0.1); }
        .math-input { border-bottom: 1px solid #333 !important; text-align: center; background: transparent !important; border-top:none!important; border-left:none!important; border-right:none!important;}
    </style>
</head>
<body class="p-4 md:p-12">

    <div class="max-w-4xl mx-auto">
        <header class="mb-16 border-b border-zinc-800 pb-10 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-black tracking-tighter italic text-white">SAFE-LOGIC <span class="text-blue-600 font-normal text-xl">AUDIT_SYSTEM</span></h1>
                <p class="text-[10px] text-zinc-500 uppercase mt-2 tracking-[0.5em]">2026 联网审计版 · 数学对冲模型</p>
            </div>
            <button onclick="location.reload()" class="text-[10px] text-zinc-600 hover:text-white uppercase font-bold border border-zinc-800 px-4 py-2 rounded-full">System Reset</button>
        </header>

        <section id="mainMenu" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div onclick="openApp('WCCA')" class="logic-card p-10 rounded-3xl h-80 flex flex-col justify-between">
                <div>
                    <div class="w-12 h-12 bg-red-950/30 rounded-xl flex items-center justify-center mb-6 border border-red-900/30">
                        <i class="fa fa-exclamation-triangle text-red-500 text-xl"></i>
                    </div>
                    <h2 class="text-xl font-bold text-white mb-2">WCCA 坏处审计</h2>
                    <p class="text-zinc-500 text-xs leading-relaxed italic">"考虑做这件事最坏的后果是什么，我能否承受？"</p>
                </div>
                <span class="text-[10px] font-bold text-red-500 uppercase tracking-widest text-right">启动单一审计协议 -></span>
            </div>

            <div onclick="openApp('WADM')" class="logic-card p-10 rounded-3xl h-80 flex flex-col justify-between border-blue-900/20">
                <div>
                    <div class="w-12 h-12 bg-blue-950/30 rounded-xl flex items-center justify-center mb-6 border border-blue-900/30">
                        <i class="fa fa-th text-blue-500 text-xl"></i>
                    </div>
                    <h2 class="text-xl font-bold text-white mb-2">WADM 决策矩阵</h2>
                    <p class="text-zinc-500 text-xs leading-relaxed italic">"在多个选项中，基于加权数学模型找到理性最优解。"</p>
                </div>
                <span class="text-[10px] font-bold text-blue-500 uppercase tracking-widest text-right">启动加权矩阵协议 -></span>
            </div>
        </section>

        <section id="wccaSection" class="hidden space-y-6">
            <div class="glass-panel p-8 rounded-3xl">
                <h3 class="text-red-500 text-xs font-bold mb-6 uppercase tracking-[0.3em]">Protocol: Worst-Case Analysis</h3>
                <textarea id="wccaInput" class="w-full input-box p-6 rounded-2xl text-sm h-40 mb-6" placeholder="输入你准备做的决定，AI 将联网搜索并模拟其最坏后果及健康损耗..."></textarea>
                <button id="wccaBtn" onclick="runWCCA()" class="w-full py-5 bg-red-600 text-white font-black rounded-2xl uppercase text-xs tracking-widest hover:bg-red-500 transition-all shadow-xl shadow-red-900/20">开始极端审计分析</button>
                <div id="wccaResult" class="hidden mt-8 p-6 border-l-2 border-red-600 bg-zinc-900/50 rounded-xl text-sm leading-relaxed text-zinc-300 font-sans"></div>
            </div>
        </section>

        <section id="wadmSection" class="hidden space-y-6">
            <div class="glass-panel p-8 rounded-3xl">
                <h3 class="text-blue-500 text-xs font-bold mb-6 uppercase tracking-[0.3em]">Protocol: Weighted Additive Matrix</h3>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-10 mb-8">
                    <div class="space-y-4">
                        <label class="text-[10px] text-zinc-500 uppercase font-bold tracking-widest">1. 定义候选方案 (用逗号隔开)</label>
                        <textarea id="wadmOpts" class="w-full input-box p-4 rounded-xl text-sm h-32" placeholder="例如：大厂Offer, 回家创业, 继续考研"></textarea>
                    </div>
                    <div class="space-y-4">
                        <label class="text-[10px] text-zinc-500 uppercase font-bold tracking-widest">2. 评估维度与权重设定</label>
                        <div id="factorList" class="space-y-2"></div>
                        <button onclick="addFactor()" class="text-[10px] text-blue-500 font-bold hover:text-white">+ 增加评估维度</button>
                    </div>
                </div>

                <button onclick="generateWADM()" class="w-full py-4 bg-white text-black font-black rounded-xl text-xs uppercase tracking-widest">生成数学打分矩阵</button>

                <div id="wadmMatrixContainer" class="hidden mt-10 pt-10 border-t border-zinc-800 space-y-8">
                    <div class="overflow-x-auto">
                        <table id="wadmTable" class="w-full text-xs text-left"></table>
                    </div>
                    <div id="wadmScores" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
                    <button id="wadmAiBtn" onclick="runWADM_AI()" class="w-full py-5 bg-blue-600 text-white font-black rounded-2xl uppercase text-xs tracking-widest shadow-xl shadow-blue-900/20">启动 AI 联网对冲审计</button>
                    <div id="wadmAiResult" class="hidden mt-8 p-8 border-l-2 border-blue-600 bg-zinc-900/50 rounded-xl text-sm leading-relaxed text-zinc-300 font-sans"></div>
                </div>
            </div>
        </section>
    </div>

    <script>
        const API_KEY = "sk-baa08b3ecffc48bbb6bfc1b4400c91ff";

        function openApp(m) {
            document.getElementById('mainMenu').classList.add('hidden');
            if(m === 'WCCA') document.getElementById('wccaSection').classList.remove('hidden');
            else {
                document.getElementById('wadmSection').classList.remove('hidden');
                if(!document.getElementById('factorList').children.length) {
                    addFactor("薪资收入", 10); addFactor("健康损耗", 9); addFactor("长期自由", 8);
                }
            }
        }

        function addFactor(n="新维度", w=5) {
            const div = document.createElement('div');
            div.className = "flex gap-2 items-center bg-zinc-900/50 p-2 rounded-lg border border-zinc-800";
            div.innerHTML = `<input type="text" value="${n}" class="flex-1 bg-transparent p-1 text-xs outline-none">
                             <input type="number" value="${w}" class="w-12 bg-black/50 text-blue-500 text-center font-bold text-xs rounded-lg p-1 fw">`;
            document.getElementById('factorList').appendChild(div);
        }

        // --- WCCA AI 逻辑 ---
        async function runWCCA() {
            const task = document.getElementById('wccaInput').value;
            const btn = document.getElementById('wccaBtn');
            const resDiv = document.getElementById('wccaResult');
            if(!task) return alert("请先输入决策内容");

            btn.innerText = "正在分析 2026 联网数据与极端风险...";
            btn.disabled = true;

            const prompt = `你是一个冷酷、理性的风险审计专家。针对用户决策：${task}。请联网搜索 2026 最新社会与健康趋势，给出 3 条最坏情况分析。`;

            try {
                const response = await fetch("https://api.deepseek.com/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: [{role: "system", content: "你是一个不讲情面、只揭露真相的风险审计机器人。"}, {role: "user", content: prompt}],
                        temperature: 0.6
                    })
                });
                const data = await response.json();
                resDiv.innerText = data.choices[0].message.content;
                resDiv.classList.remove('hidden');
            } catch (e) { alert("AI 连接异常，请检查网络或额度。"); }
            finally { btn.innerText = "重新执行极端审计"; btn.disabled = false; }
        }

        // --- WADM 数学逻辑 ---
        function generateWADM() {
            const optVal = document.getElementById('wadmOpts').value;
            if(!optVal) return alert("请先输入备选方案");
            const opts = optVal.split(/[,，\s\n]+/).filter(o => o.trim() !== "");
            const factorDivs = document.getElementById('factorList').children;
            
            let totalW = 0;
            Array.from(factorDivs).forEach(f => totalW += parseFloat(f.querySelectorAll('input')[1].value));

            let html = `<thead><tr class="text-zinc-500 border-b border-zinc-800"><th class="pb-4">审计维度</th><th class="pb-4">权重 w_j</th>`;
            opts.forEach(o => html += `<th class="pb-4 text-center text-zinc-300">${o} (r_ij)</th>`);
            html += `</tr></thead><tbody class="divide-y divide-zinc-900">`;

            Array.from(factorDivs).forEach((f, i) => {
                const name = f.querySelectorAll('input')[0].value;
                const weight = parseFloat(f.querySelectorAll('input')[1].value);
                const normW = (weight / totalW).toFixed(2);
                html += `<tr><td class="py-4 font-bold text-xs text-zinc-100">${name}</td><td class="py-4 text-zinc-600 text-[10px] font-bold">${normW}</td>`;
                opts.forEach((o, j) => {
                    html += `<td class="py-4 text-center"><input type="number" value="5" max="10" min="1" class="math-input r-val w-12 text-blue-400 font-bold" data-w="${normW}" data-oidx="${j}"></td>`;
                });
                html += `</tr>`;
            });
            document.getElementById('wadmTable').innerHTML = html;
            document.getElementById('wadmMatrixContainer').classList.remove('hidden');
            document.querySelectorAll('.r-val').forEach(el => el.oninput = calcWADM);
            calcWADM();
        }

        function calcWADM() {
            const opts = document.getElementById('wadmOpts').value.split(/[,，\s\n]+/).filter(o => o.trim() !== "");
            let res = opts.map(() => 0);
            document.querySelectorAll('.r-val').forEach(el => {
                res[el.dataset.oidx] += parseFloat(el.dataset.w) * parseFloat(el.value || 0);
            });
            const div = document.getElementById('wadmScores');
            div.innerHTML = "";
            res.forEach((s, i) => {
                div.innerHTML += `<div class="bg-black/50 p-6 rounded-2xl border border-zinc-800"><p class="text-[9px] text-zinc-500 font-bold mb-1 uppercase tracking-widest">${opts[i]}</p><p class="text-2xl font-black text-blue-500 italic">V = ${s.toFixed(2)}</p></div>`;
            });
        }

        async function runWADM_AI() {
            const btn = document.getElementById('wadmAiBtn');
            const resDiv = document.getElementById('wadmAiResult');
            btn.innerText = "正在调取 2026 联网对冲数据...";
            btn.disabled = true;

            const prompt = `用户针对决策进行了 WADM 评分：${document.getElementById('wadmOpts').value}，数学结果是：${document.getElementById('wadmScores').innerText}。请联网搜索相关行业 2026 现状，对冲用户的主观偏见并给出毒舌审计建议。`;

            try {
                const response = await fetch("https://api.deepseek.com/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: [{role: "system", content: "你是一个只看数据、拒绝客套的顶级对冲风险专家。"}, {role: "user", content: prompt}]
                    })
                });
                const data = await response.json();
                resDiv.innerText = data.choices[0].message.content;
                resDiv.classList.remove('hidden');
                resDiv.scrollIntoView({ behavior: 'smooth' });
            } catch (e) { alert("调用失败"); }
            finally { btn.innerText = "再次执行联网审计"; btn.disabled = false; }
        }
    </script>
</body>
</html>

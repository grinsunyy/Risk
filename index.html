<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe-Logic Auditor | 决策风险审计</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background-color: #050505; color: #e5e7eb; font-family: 'JetBrains Mono', monospace; overflow-x: hidden; }
        .neo-panel { background: rgba(15, 15, 15, 0.95); border: 1px solid #1e1e1e; }
        .mode-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; border: 1px solid #27272a; position: relative; }
        .mode-card:hover { border-color: #3b82f6; background: rgba(59, 130, 246, 0.05); transform: translateY(-5px); }
        .btn-logic { background: #f4f4f5; color: #000; font-size: 11px; font-weight: bold; letter-spacing: 0.1em; }
        .btn-logic:hover { background: #3b82f6; color: #fff; }
        input, textarea { background: #09090b !important; border: 1px solid #27272a !important; color: #fff !important; }
        input:focus, textarea:focus { border-color: #3b82f6 !important; outline: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-6xl mx-auto mb-10 border-b border-zinc-800 pb-6 flex justify-between items-center">
        <h1 class="text-lg font-black tracking-tighter uppercase text-zinc-100">Safe-Logic Auditor</h1>
        <button onclick="location.reload()" class="text-[10px] text-zinc-500 hover:text-white uppercase font-bold"><i class="fa fa-refresh mr-1"></i> 重置系统</button>
    </header>

    <main class="max-w-6xl mx-auto">
        <section id="modeSelection" class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">
            <div onclick="showModule('wcca')" class="mode-card p-10 rounded-2xl flex flex-col justify-between min-h-[350px]">
                <div>
                    <div class="w-12 h-12 bg-red-500/10 text-red-500 rounded-xl flex items-center justify-center mb-8 border border-red-500/20"><i class="fa fa-heartbeat text-2xl"></i></div>
                    <h2 class="text-2xl font-black mb-4 uppercase">单一事件审计 (WCCA)</h2>
                    <p class="text-zinc-500 text-xs leading-relaxed">评估单一决策的健康风险与生活代价。强制模拟身体健康受损、精神压力过载等最坏后果。</p>
                </div>
                <button class="btn-logic w-full py-4 mt-8 rounded-lg uppercase">执行风险审计</button>
            </div>

            <div onclick="showModule('wadm')" class="mode-card p-10 rounded-2xl flex flex-col justify-between min-h-[350px] border-blue-500/20">
                <div>
                    <div class="w-12 h-12 bg-blue-500/10 text-blue-500 rounded-xl flex items-center justify-center mb-8 border border-blue-500/20"><i class="fa fa-balance-scale text-2xl"></i></div>
                    <h2 class="text-2xl font-black mb-4 uppercase">决策优选矩阵 (WADM)</h2>
                    <p class="text-zinc-500 text-xs leading-relaxed">在多个选项间犹豫时使用。基于权重（薪水、自由度、健康等）进行量化对冲打分。</p>
                </div>
                <button class="btn-logic w-full py-4 mt-8 rounded-lg uppercase">生成优选矩阵</button>
            </div>
        </section>

        <section id="wccaModule" class="hidden neo-panel p-8 rounded-2xl space-y-6">
            <h3 class="text-red-500 text-[10px] font-black uppercase tracking-[0.3em]">[ Protocol: WCCA_Single_Event ]</h3>
            <textarea id="wccaInput" class="w-full p-5 rounded-xl text-sm leading-relaxed" rows="4" placeholder="描述你打算做的决定..."></textarea>
            <button onclick="runWCCA()" class="bg-red-600 text-white text-[10px] font-bold px-10 py-4 uppercase rounded-lg">分析潜在坏处</button>
            <div id="wccaResult" class="hidden mt-10 pt-10 border-t border-zinc-800 space-y-8"></div>
        </section>

        <section id="wadmModule" class="hidden neo-panel p-8 rounded-2xl space-y-8">
            <h3 class="text-blue-500 text-[10px] font-black uppercase tracking-[0.3em]">[ Protocol: WADM_Matrix ]</h3>
            <div class="space-y-4">
                <label class="text-[9px] text-zinc-500 uppercase font-bold tracking-widest text-blue-400">1. 输入所有选项 (如: 上海Offer, 留职)</label>
                <input id="wadmOptions" type="text" class="w-full p-4 rounded-xl text-sm" placeholder="选项以逗号隔开">
            </div>
            <div class="space-y-4">
                <label class="text-[9px] text-zinc-500 uppercase font-bold tracking-widest text-blue-400">2. 设置影响因素及权重 (1-10)</label>
                <div id="factorList" class="space-y-3"></div>
                <button onclick="addFactorRow()" class="text-[9px] text-zinc-500 hover:text-blue-500 font-bold tracking-widest">+ 添加维度 (如: 薪水, 压力)</button>
            </div>
            <button onclick="runWADM()" class="bg-blue-600 text-white text-[10px] font-bold px-12 py-4 uppercase rounded-lg">启动逻辑对冲</button>
            <div id="wadmResult" class="hidden mt-10 pt-10 border-t border-zinc-800"></div>
        </section>
    </main>

    <script>
        function showModule(type) {
            document.getElementById('modeSelection').classList.add('hidden');
            if(type === 'wcca') { document.getElementById('wccaModule').classList.remove('hidden'); }
            else { document.getElementById('wadmModule').classList.remove('hidden'); if(document.getElementById('factorList').children.length === 0) { addFactorRow("薪水回报", 10); addFactorRow("身心健康", 9); } }
        }

        async function runWCCA() {
            const input = document.getElementById('wccaInput').value; if(!input) return;
            const res = document.getElementById('wccaResult'); res.classList.remove('hidden');
            res.innerHTML = `<p class="text-[10px] text-zinc-600 animate-pulse uppercase">模拟生理极限中...</p>`;
            await new Promise(r => setTimeout(r, 1200));
            res.innerHTML = `<div class="p-8 bg-zinc-900 border border-red-900/20 rounded-2xl"><p class="text-[10px] text-red-500 mb-4 font-black">坏处审计结果</p><p class="text-sm text-zinc-100 italic leading-relaxed mb-6">该决策 "${input}" 会导致长期皮质醇过载，对身体健康有显著负面影响，建议谨慎考虑生命质量代价。</p><div class="flex justify-between items-center"><span class="text-[10px] text-zinc-500 uppercase">风险崩溃概率</span><span class="text-4xl font-black text-white">37%</span></div></div>`;
        }

        function addFactorRow(name = "", weight = 5) {
            const div = document.createElement('div'); div.className = "flex gap-2 items-center bg-zinc-900/50 p-3 rounded-xl border border-zinc-800";
            div.innerHTML = `<input type="text" value="${name}" class="flex-1 p-2 text-[11px] rounded bg-black"> <input type="number" value="${weight}" class="w-12 p-2 text-[11px] text-center rounded bg-black text-blue-500 font-bold"> <button onclick="this.parentElement.remove()" class="text-zinc-800 hover:text-red-500"><i class="fa fa-close"></i></button>`;
            document.getElementById('factorList').appendChild(div);
        }

        function runWADM() {
            const optionsStr = document.getElementById('wadmOptions').value; if(!optionsStr) return;
            const options = optionsStr.split(/[,，\s]+/).filter(o => o.trim() !== "");
            const factors = document.getElementById('factorList').children;
            let totals = options.map(() => 0);
            Array.from(factors).forEach(row => {
                const fWeight = parseInt(row.querySelectorAll('input')[1].value);
                options.forEach((opt, idx) => { totals[idx] += (Math.floor(Math.random() * 5) + 5) * fWeight; });
            });
            const max = Math.max(...totals); const winnerIdx = totals.indexOf(max);
            const res = document.getElementById('wadmResult'); res.classList.remove('hidden');
            res.innerHTML = `<div class="mb-10 p-10 bg-blue-600 text-white rounded-3xl text-center"><div class="text-[9px] uppercase font-bold tracking-[0.4em] mb-3 opacity-60">最终优选</div><div class="text-5xl font-black">${options[winnerIdx]}</div><p class="text-[10px] mt-4 opacity-70 italic">根据加权矩阵，此方案为当前最优选。</p></div>`;
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>

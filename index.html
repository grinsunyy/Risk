<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe-Logic 智能决策助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #ffffff; color: #1a1a1a; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }
        .card { background: #f9f9f9; border: 1px solid #e5e5e5; transition: 0.2s; }
        .card:hover { border-color: #3b82f6; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .btn-blue { background-color: #3b82f6; color: white; transition: 0.3s; }
        .btn-blue:hover { background-color: #2563eb; transform: translateY(-1px); }
        .btn-outline { border: 1px solid #e5e5e5; color: #666; background: #fff; }
        .btn-outline:hover { background: #f5f5f5; }
        input, textarea { border: 1px solid #ddd !important; border-radius: 8px !important; padding: 12px !important; width: 100%; margin-top: 4px; }
        .history-item { border-bottom: 1px solid #eee; padding: 10px 0; font-size: 13px; color: #666; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-10 border-b pb-6">
            <h1 class="text-2xl font-bold tracking-tight text-gray-900">Safe-Logic</h1>
            <button onclick="toggleHistory()" class="text-sm text-blue-600 font-medium italic underline">查看历史记录</button>
        </header>

        <div id="homePage" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="card p-8 rounded-3xl flex flex-col justify-between h-72">
                <div>
                    <h2 class="text-xl font-bold mb-3">WCCA 坏处分析</h2>
                    <p class="text-gray-500 text-sm">输入一个决定，分析它可能带来的最坏后果和健康影响。</p>
                </div>
                <button onclick="enterModule('WCCA')" class="btn-blue w-full py-4 rounded-xl font-bold text-lg">开始分析</button>
            </div>
            <div class="card p-8 rounded-3xl flex flex-col justify-between h-72">
                <div>
                    <h2 class="text-xl font-bold mb-3">WADM 矩阵分析</h2>
                    <p class="text-gray-500 text-sm">多个选项选不出来？通过加权平均决策矩阵算一个最高分。</p>
                </div>
                <button onclick="enterModule('WADM')" class="btn-blue w-full py-4 rounded-xl font-bold text-lg">开始分析</button>
            </div>
        </div>

        <div id="historyPanel" class="hidden mb-10 p-6 bg-gray-50 rounded-2xl">
            <h3 class="font-bold mb-4">分析历史</h3>
            <div id="historyList"></div>
            <button onclick="clearHistory()" class="mt-4 text-xs text-red-500 uppercase tracking-widest">清空所有记录</button>
        </div>

        <div id="wccaPage" class="hidden space-y-6">
            <div class="bg-white border p-6 rounded-3xl shadow-sm">
                <label class="font-bold text-gray-700">你想做的决定是什么？</label>
                <textarea id="wccaInput" rows="4" placeholder="例如：我想辞职全职做自媒体..."></textarea>
                <div class="flex gap-4 mt-6">
                    <button onclick="goBack()" class="btn-outline flex-1 py-4 rounded-xl font-bold">返回主页</button>
                    <button onclick="runWCCA()" class="btn-blue flex-1 py-4 rounded-xl font-bold">开始分析</button>
                </div>
                <div id="wccaRes" class="hidden mt-8 p-6 bg-blue-50 rounded-2xl text-gray-800 leading-relaxed text-sm"></div>
                <button id="wccaRetry" onclick="runWCCA()" class="hidden mt-4 text-blue-600 text-sm font-bold underline">再次分析</button>
            </div>
        </div>

        <div id="wadmPage" class="hidden space-y-6">
            <div class="bg-white border p-6 rounded-3xl shadow-sm">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="font-bold text-gray-700 italic">1. 填写你的选项 (逗号隔开)</label>
                        <textarea id="wadmOpts" rows="3" placeholder="例如：上海Offer, 回家考公"></textarea>
                    </div>
                    <div>
                        <label class="font-bold text-gray-700 italic">2. 评估维度与权重 (1-10分)</label>
                        <div id="factorList" class="space-y-2 mt-2"></div>
                        <button onclick="addFactor()" class="text-sm text-blue-500 mt-2">+ 增加维度</button>
                    </div>
                </div>
                <div class="flex gap-4 mt-8">
                    <button onclick="goBack()" class="btn-outline flex-1 py-4 rounded-xl font-bold">返回主页</button>
                    <button onclick="runWADM()" class="btn-blue flex-1 py-4 rounded-xl font-bold">开始分析</button>
                </div>
                <div id="wadmRes" class="hidden mt-8 p-6 bg-blue-50 rounded-2xl text-gray-800 leading-relaxed text-sm"></div>
                <button id="wadmRetry" onclick="runWADM()" class="hidden mt-4 text-blue-600 text-sm font-bold underline">再次分析</button>
            </div>
        </div>
    </div>

    <script>
        // 预置密钥
        const API_KEY = "sk-baa08b3ecffc48bbb6bfc1b4400c91ff";

        function enterModule(m) {
            document.getElementById('homePage').classList.add('hidden');
            document.getElementById(m.toLowerCase() + 'Page').classList.remove('hidden');
            if(m === 'WADM' && !document.getElementById('factorList').children.length) {
                addFactor("薪水收入", 10); addFactor("身心健康", 9); addFactor("长期自由", 8);
            }
        }

        function goBack() {
            location.reload();
        }

        function addFactor(n="维度", w=5) {
            const div = document.createElement('div');
            div.className = "flex gap-2";
            div.innerHTML = `<input type="text" value="${n}" class="flex-1"> <input type="number" value="${w}" class="w-16 text-center font-bold">`;
            document.getElementById('factorList').appendChild(div);
        }

        // 统一的数据清洗函数
        function cleanText(text) {
            return text.replace(/[#*—\-]/g, '').trim() + "\n\n大数据分析，仅供参考";
        }

        async function runWCCA() {
            const input = document.getElementById('wccaInput').value;
            const resDiv = document.getElementById('wccaRes');
            const retryBtn = document.getElementById('wccaRetry');
            if(!input) return alert("内容不能为空");

            saveHistory("WCCA: " + input.substring(0, 15) + "...");
            resDiv.innerText = "正在通过大数据进行分析...";
            resDiv.classList.remove('hidden');

            const prompt = `请分析以下决策的最坏后果：${input}。请言简意赅说大白话，禁止使用特殊符号。`;

            try {
                const response = await fetch("https://api.deepseek.com/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: [{role: "user", content: prompt}]
                    })
                });
                const data = await response.json();
                resDiv.innerText = cleanText(data.choices[0].message.content);
                retryBtn.classList.remove('hidden');
            } catch (e) { resDiv.innerText = "连接失败，请重试"; }
        }

        async function runWADM() {
            const opts = document.getElementById('wadmOpts').value;
            const resDiv = document.getElementById('wadmRes');
            const retryBtn = document.getElementById('wadmRetry');
            if(!opts) return alert("请输入选项");

            saveHistory("WADM: " + opts.substring(0, 15) + "...");
            resDiv.innerText = "正在执行加权计算并调取大数据...";
            resDiv.classList.remove('hidden');

            // 构建指令内容
            const aiInstruction = `执行加权平均决策矩阵计算，先确定所有决策评价指标，为各指标分配权重且权重总和为1或100%，对每个备选方案按各指标进行1-10分量化评分，再使用公式总得分=Σ(指标权重×对应方案评分)，分别计算每个方案的加权总分，最终按总分从高到低排序，总分最高者为最优决策方案。目前的备选方案是：${opts}。`;

            try {
                const response = await fetch("https://api.deepseek.com/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: [{role: "system", content: "你是一个只说大白话的决策助手，不使用特殊符号。"}, {role: "user", content: aiInstruction}]
                    })
                });
                const data = await response.json();
                resDiv.innerText = cleanText(data.choices[0].message.content);
                retryBtn.classList.remove('hidden');
            } catch (e) { resDiv.innerText = "分析超时，请重试"; }
        }

        // 历史记录功能
        function saveHistory(text) {
            let history = JSON.parse(localStorage.getItem('sl_history') || "[]");
            history.unshift(new Date().toLocaleString() + ": " + text);
            localStorage.setItem('sl_history', JSON.stringify(history.slice(0, 10)));
            loadHistory();
        }

        function loadHistory() {
            const list = document.getElementById('historyList');
            const history = JSON.parse(localStorage.getItem('sl_history') || "[]");
            list.innerHTML = history.length ? "" : "<p class='text-xs text-gray-400'>暂无历史记录</p>";
            history.forEach(item => {
                const div = document.createElement('div');
                div.className = "history-item";
                div.innerText = item;
                list.appendChild(div);
            });
        }

        function toggleHistory() {
            const panel = document.getElementById('historyPanel');
            panel.classList.toggle('hidden');
            loadHistory();
        }

        function clearHistory() {
            localStorage.removeItem('sl_history');
            loadHistory();
        }
    </script>
</body>
</html>

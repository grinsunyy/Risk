<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe-Logic | 决策审计系统 V4.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background-color: #050505; color: #d4d4d8; font-family: 'JetBrains Mono', monospace; }
        .math-card { background: linear-gradient(145deg, #0f172a, #000000); border: 1px solid #1e293b; }
        input, textarea { background: #000 !important; border: 1px solid #333 !important; color: #fff !important; }
        .highlight-blue { color: #3b82f6; text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        .result-bar { transition: width 1s ease-in-out; }
    </style>
</head>
<body class="p-4 md:p-10">

    <main class="max-w-4xl mx-auto">
        <div class="mb-8 p-4 border border-dashed border-zinc-800 rounded-xl text-[10px] bg-zinc-900/30">
            <p class="text-zinc-500 mb-2 font-bold uppercase tracking-widest flex items-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> 系统安全配置已就绪
            </p>
            <div class="flex gap-2">
                <input id="apiKey" type="password" class="flex-1 p-2 rounded text-zinc-400" placeholder="请在此输入你的 sk- 密钥...">
                <button onclick="saveKey()" class="px-6 py-2 bg-blue-600 text-white rounded font-bold hover:bg-blue-500 transition-colors">确认激活</button>
            </div>
            <p class="mt-2 text-zinc-600">提示：密钥仅保存在你的本地浏览器，不会上传至代码库。</p>
        </div>

        <header class="mb-12 text-center">
            <h1 class="text-3xl font-black tracking-tighter text-zinc-100">SAFE-LOGIC <span class="highlight-blue text-lg italic">AUDITOR</span></h1>
            <p class="text-[10px] text-zinc-500 mt-2 uppercase tracking-[0.4em]">Weighted Additive Decision Matrix : $V_i = \sum_{j=1}^{n} w_j \cdot r_{ij}$</p>
        </header>

        <section class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">
            <div class="space-y-4">
                <h3 class="text-xs font-bold text-zinc-500 border-l-2 border-blue-600 pl-2">Step 1: 录入候选方案</h3>
                <textarea id="wadmOpts" class="w-full p-4 rounded-xl text-sm h-28" placeholder="请输入你的对比项，用逗号隔开。&#10;例如：上海互联网大厂, 老家体制内, 自媒体创业"></textarea>
            </div>
            <div class="space-y-4">
                <h3 class="text-xs font-bold text-zinc-500 border-l-2 border-blue-600 pl-2">Step 2: 定义评估维度与权重</h3>
                <div id="factorList" class="space-y-2 max-h-48 overflow-y-auto pr-2">
                    </div>
                <button onclick="addRow()" class="text-[10px] font-bold text-blue-500 hover:text-white">+ 增加新维度 (如：自由度, 城市气候)</button>
            </div>
        </section>

        <button onclick="buildMatrix()" class="w-full py-5 bg-zinc-100 text-black font-black rounded-2xl uppercase text-xs tracking-[0.3em] hover:bg-blue-600 hover:text-white transition-all shadow-2xl shadow-blue-900/20 mb-10">
            生成逻辑打分矩阵
        </button>

        <section id="matrixArea" class="hidden space-y-8">
            <div class="math-card p-6 rounded-3xl overflow-x-auto shadow-2xl">
                <h3 class="text-xs font-bold text-zinc-500 mb-6 uppercase tracking-widest">Step 3: 归一化打分 (1-10分)</h3>
                <table id="matrixTable" class="w-full text-sm text-left"></table>
            </div>

            <div id="finalReport" class="hidden animate-in fade-in slide-in-from-bottom-5 duration-700">
                <div id="scoreDisplay" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8"></div>
                
                <button id="aiBtn" onclick="askDeepSeek()" class="w-full py-4 border border-blue-600/50 text-blue-500 font-bold rounded-xl text-[10px] uppercase tracking-widest hover:bg-blue-600/10 transition-all flex items-center justify-center gap-2">
                    <i class="fa fa-robot"></i> 启动 DeepSeek 联网现实性审计
                </button>

                <div id="aiResponse" class="hidden mt-8 p-8 bg-zinc-900/80 rounded-3xl border border-zinc-800 leading-relaxed">
                    <div class="flex items-center gap-2 mb-4">
                        <span class="w-2 h-2 bg-blue-500 rounded-full animate-ping"></span>
                        <span class="text-xs font-bold text-blue-500 uppercase tracking-widest">AI Audit Analysis</span>
                    </div>
                    <div id="aiText" class="text-sm text-zinc-300 whitespace-pre-wrap font-sans"></div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // 自动填入你提供的密钥（仅作为小白首次使用的便利，代码运行后建议点击保存）
        const providedKey = "sk-baa08b3ecffc48bbb6bfc1b4400c91ff";
        
        function saveKey() {
            const key = document.getElementById('apiKey').value;
            localStorage.setItem('logic_api_key', key);
            alert('系统已激活：API 密钥本地存储成功。');
        }

        window.onload = () => {
            const saved = localStorage.getItem('logic_api_key');
            if(saved) {
                document.getElementById('apiKey').value = saved;
            } else {
                document.getElementById('apiKey').value = providedKey;
            }
            addRow("薪资收入", 10);
            addRow("压力/健康", 9);
            addRow("长期成长", 8);
        };

        function addRow(n = "", w = 5) {
            const div = document.createElement('div');
            div.className = "flex gap-2 items-center bg-zinc-900/50 p-2 rounded-lg border border-zinc-800";
            div.innerHTML = `
                <input type="text" value="${n}" class="flex-1 bg-transparent p-1 text-xs outline-none" placeholder="维度">
                <input type="number" value="${w}" class="w-12 bg-black/50 text-blue-500 text-center font-bold text-xs rounded factor-w" title="权重">
                <button onclick="this.parentElement.remove()" class="text-zinc-700 hover:text-red-500 px-2">×</button>
            `;
            document.getElementById('factorList').appendChild(div);
        }

        function buildMatrix() {
            const optVal = document.getElementById('wadmOpts').value;
            if(!optVal) return alert("请先录入备选方案");
            const opts = optVal.split(/[,，\s\n]+/).filter(o => o.trim() !== "");
            const factorDivs = document.getElementById('factorList').children;
            
            let totalW = 0;
            Array.from(factorDivs).forEach(f => totalW += parseFloat(f.querySelectorAll('input')[1].value));

            let table = `<thead><tr class="text-[10px] text-zinc-500 uppercase border-b border-zinc-800"><th class="pb-4">指标维度</th><th class="pb-4">权重 (w_j)</th>`;
            opts.forEach(o => table += `<th class="pb-4 text-center text-zinc-300">${o}</th>`);
            table += `</tr></thead><tbody class="divide-y divide-zinc-900">`;

            Array.from(factorDivs).forEach((f, idx) => {
                const name = f.querySelectorAll('input')[0].value;
                const rawW = parseFloat(f.querySelectorAll('input')[1].value);
                const normW = (rawW / totalW).toFixed(2); 
                table += `<tr>
                    <td class="py-4 font-bold text-xs">${name}</td>
                    <td class="py-4 text-zinc-600 text-[10px] font-bold">${normW}</td>`;
                opts.forEach((o, oIdx) => {
                    table += `<td class="py-4 text-center">
                        <input type="number" value="5" max="10" min="1" 
                        class="w-10 bg-zinc-800 border-none rounded text-center text-white font-bold r-val" 
                        data-w="${normW}" data-oidx="${oIdx}">
                    </td>`;
                });
                table += `</tr>`;
            });
            table += `</tbody>`;

            document.getElementById('matrixTable').innerHTML = table;
            document.getElementById('matrixArea').classList.remove('hidden');
            document.getElementById('finalReport').classList.remove('hidden');
            
            document.querySelectorAll('.r-val').forEach(el => el.oninput = runCalc);
            runCalc();
        }

        function runCalc() {
            const optVal = document.getElementById('wadmOpts').value;
            const opts = optVal.split(/[,，\s\n]+/).filter(o => o.trim() !== "");
            let sums = opts.map(() => 0);
            
            document.querySelectorAll('.r-val').forEach(el => {
                const w = parseFloat(el.dataset.w);
                const r = parseFloat(el.value || 0);
                sums[el.dataset.oidx] += w * r;
            });

            const display = document.getElementById('scoreDisplay');
            display.innerHTML = "";
            sums.forEach((s, i) => {
                const percentage = (s * 10).toFixed(0);
                display.innerHTML += `
                    <div class="bg-zinc-900/80 p-5 rounded-2xl border border-zinc-800 relative overflow-hidden group">
                        <div class="result-bar absolute bottom-0 left-0 h-1 bg-blue-600/30" style="width: ${percentage}%"></div>
                        <p class="text-[9px] text-zinc-500 font-bold uppercase mb-1">${opts[i]}</p>
                        <p class="text-3xl font-black text-zinc-100 italic">V = ${s.toFixed(2)}</p>
                    </div>`;
            });
        }

        async function askDeepSeek() {
            const key = localStorage.getItem('logic_api_key') || providedKey;
            if(!key) return alert("API 密钥未配置");

            const btn = document.getElementById('aiBtn');
            const resArea = document.getElementById('aiResponse');
            const resText = document.getElementById('aiText');
            
            btn.innerHTML = `<i class="fa fa-circle-o-notch animate-spin"></i> 正在进行 2026 联网数据审计...`;
            btn.disabled = true;

            const opts = document.getElementById('wadmOpts').value;
            const results = document.getElementById('scoreDisplay').innerText;
            const matrixContext = Array.from(document.getElementById('factorList').children)
                .map(f => f.querySelectorAll('input')[0].value).join(', ');

            const prompt = `你是一名资深的决策精算师。用户正在使用 WADM 数学模型对以下方案进行审计：
            方案：${opts}
            涉及维度：${matrixContext}
            初步数学评分 V_i 结果：${results}
            
            任务：
            1. 请联网搜索并分析这些选项在 2026 年的最新社会、行业与健康风险数据。
            2. 针对用户的初步评分，指出哪些地方可能存在“由于主观偏见导致的误判”。
            3. 提供一个基于理性最大化的最终决策建议。`;

            try {
                const response = await fetch("https://api.deepseek.com/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${key}` },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: [{role: "system", content: "你是一个冷静、理性的深度审计专家。"}, {role: "user", content: prompt}],
                        temperature: 0.7
                    })
                });

                const data = await response.json();
                resText.innerText = data.choices[0].message.content;
                resArea.classList.remove('hidden');
                resArea.scrollIntoView({ behavior: 'smooth' });
            } catch (e) {
                alert("DeepSeek 响应异常：请检查密钥有效性或余额。");
            } finally {
                btn.innerHTML = `<i class="fa fa-robot"></i> 再次提交 AI 审计`;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>

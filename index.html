<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe-Logic | 智性决策工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 100vh;
            margin: 0;
        }
        h1, h2, h3, .serif { font-family: 'Noto Serif SC', serif; }

        /* 首页：浅蓝白渐变 */
        .theme-home { background: linear-gradient(135deg, #e0f2fe 0%, #ffffff 100%); color: #0c4a6e; }
        
        /* WCCA：黑红色 */
        .theme-wcca { background: #050000; color: #ff4d4d; }
        .theme-wcca .vibrant-input { border: 1px solid #450a0a; background: #1a0505; color: #ff8080; }
        .theme-wcca button#execBtn { border-color: #ff4d4d; color: #ff4d4d; }
        .theme-wcca button#execBtn:hover { background: #ff4d4d; color: #000; }

        /* WADM：黑绿色 */
        .theme-wadm { background: #000502; color: #4ade80; }
        .theme-wadm .vibrant-input { border: 1px solid #064e3b; background: #022c22; color: #a7f3d0; }
        .theme-wadm button#execBtn { border-color: #4ade80; color: #4ade80; }
        .theme-wadm button#execBtn:hover { background: #4ade80; color: #000; }

        .vibrant-input { border-radius: 6px; padding: 12px; width: 100%; outline: none; transition: 0.3s; }
        
        /* 表格样式 */
        .wadm-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .wadm-table th, .wadm-table td { border: 1px solid currentColor; padding: 8px; text-align: center; font-size: 13px; }
        .add-col-btn { cursor: pointer; padding: 4px 8px; border: 1px dashed currentColor; border-radius: 4px; font-size: 10px; }
        
        #resultContent { font-size: 15px; line-height: 1.8; letter-spacing: 0.02em; }
        .chart-container { position: relative; height: 400px; width: 100%; margin-top: 30px; }
        .fade-in { animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="theme-home p-6 md:p-16">

    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-start mb-20 fade-in">
            <div>
                <h1 class="text-4xl font-bold tracking-tighter">Safe-Logic</h1>
                <p class="text-[10px] uppercase tracking-[0.5em] opacity-60 mt-2">理性是唯一的避风港</p>
            </div>
            <button onclick="location.reload()" class="text-xs border-b border-current pb-1 opacity-70 hover:opacity-100">RESET / 重置</button>
        </header>

        <div id="homePage" class="grid grid-cols-1 md:grid-cols-2 gap-10 fade-in">
            <div onclick="enterModule('WCCA')" class="p-12 border border-blue-100 hover:border-blue-400 transition-all cursor-pointer rounded-2xl bg-white/40 shadow-sm group">
                <h2 class="serif text-2xl font-bold mb-4">WCCA <span class="text-sm font-light opacity-60">最坏情况审计</span></h2>
                <p class="text-sm leading-relaxed opacity-70">单一决策的极限压力测试。先看清万丈深渊，再决定是否起跳。</p>
                <div class="mt-8 text-[10px] font-bold group-hover:translate-x-2 transition-transform">PROCEED →</div>
            </div>
            <div onclick="enterModule('WADM')" class="p-12 border border-blue-100 hover:border-blue-400 transition-all cursor-pointer rounded-2xl bg-white/40 shadow-sm group">
                <h2 class="serif text-2xl font-bold mb-4">WADM <span class="text-sm font-light opacity-60">加权矩阵审计</span></h2>
                <p class="text-sm leading-relaxed opacity-70">多维量化评估。用数学消除情绪噪音，在复杂选项中定位最优解。</p>
                <div class="mt-8 text-[10px] font-bold group-hover:translate-x-2 transition-transform">PROCEED →</div>
            </div>
        </div>

        <div id="appPage" class="hidden fade-in">
            
            <div id="wccaForm" class="hidden max-w-2xl mx-auto space-y-8">
                <h3 class="serif text-xl text-center">输入待审计的单一决策逻辑</h3>
                <textarea id="wccaInput" class="vibrant-input h-48 serif text-lg" placeholder="例如：投入全部积蓄在二线城市加盟火锅店..."></textarea>
            </div>

            <div id="wadmForm" class="hidden space-y-6">
                <div class="flex justify-between items-end mb-4">
                    <h3 class="serif text-xl">加权平均决策矩阵 (WADM)</h3>
                    <button onclick="addOption()" class="add-col-btn hover:bg-white hover:text-black transition-all">+ 新增选项</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="wadm-table" id="wadmTable">
                        <thead>
                            <tr id="tableHeader">
                                <th class="w-1/3">因素 (权重 1-10)</th>
                                <th>选项 A</th>
                                <th>选项 B</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                        <tfoot>
                            <tr class="font-bold opacity-90">
                                <td>总分 (Σ 权重×评分)</td>
                                <td id="total-0">0</td>
                                <td id="total-1">0</td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
                <button onclick="addRow()" class="text-[10px] font-bold border border-current px-4 py-2 rounded-full hover:bg-current hover:text-black transition-all">+ 添加评估因素</button>
            </div>

            <div class="max-w-2xl mx-auto">
                <button onclick="execute()" id="execBtn" class="w-full mt-16 py-6 border border-current font-bold text-xs tracking-[0.4em] transition-all rounded-xl">执行逻辑审计分析</button>
            </div>

            <div id="resultArea" class="hidden mt-20 fade-in border-t border-current pt-12 pb-32">
                <div id="resultContent" class="serif whitespace-pre-wrap"></div>
                <div id="chartSection" class="hidden chart-container">
                    <canvas id="decisionChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "sk-xxxxxxxxxxxxxxxx"; // 请在此处填入你的 DeepSeek API Key
        let currentModule = '';
        let optionCount = 2;
        let chartInstance = null;

        function enterModule(m) {
            currentModule = m;
            document.body.className = m === 'WCCA' ? 'theme-wcca' : 'theme-wadm';
            document.getElementById('homePage').classList.add('hidden');
            document.getElementById('appPage').classList.remove('hidden');
            document.getElementById('wccaForm').classList.toggle('hidden', m !== 'WCCA');
            document.getElementById('wadmForm').classList.toggle('hidden', m !== 'WADM');
            if(m === 'WADM' && document.getElementById('tableBody').children.length === 0) {
                for(let i=0; i<3; i++) addRow();
            }
        }

        function addRow() {
            const tr = document.createElement('tr');
            let html = `<td><input type="text" placeholder="例: 长期收益" class="bg-transparent outline-none w-2/3 text-left"> (<input type="number" value="5" min="1" max="10" class="bg-transparent w-8 text-center font-bold">)</td>`;
            for(let i=0; i<optionCount; i++) {
                html += `<td><input type="number" value="5" min="1" max="10" class="bg-transparent w-full text-center"></td>`;
            }
            tr.innerHTML = html;
            document.getElementById('tableBody').appendChild(tr);
        }

        function addOption() {
            optionCount++;
            const char = String.fromCharCode(64 + optionCount);
            const th = document.createElement('th');
            th.innerText = `选项 ${char}`;
            document.getElementById('tableHeader').appendChild(th);
            
            Array.from(document.getElementById('tableBody').children).forEach(row => {
                const td = document.createElement('td');
                td.innerHTML = `<input type="number" value="5" min="1" max="10" class="bg-transparent w-full text-center">`;
                row.appendChild(td);
            });

            const footer = document.getElementById('wadmTable').tFoot.rows[0];
            const td = document.createElement('td');
            td.id = `total-${optionCount-1}`;
            td.innerText = "0";
            footer.appendChild(td);
        }

        async function execute() {
            const btn = document.getElementById('execBtn');
            const resArea = document.getElementById('resultArea');
            const resContent = document.getElementById('resultContent');
            
            btn.innerText = "正在同步大数据分析模型...";
            btn.disabled = true;

            let prompt = "";
            let chartData = null;

            if(currentModule === 'WCCA') {
                prompt = `对决策执行最坏情况审计：${document.getElementById('wccaInput').value}。
                要求：
                1. 言简意赅，不要废话。
                2. 必须先用一段话给出“最坏的坏结果”。
                3. 然后用一段话给出“可能的好处”。
                4. 严禁使用任何表情包或奇怪符号，保持冷峻的文字风格。`;
            } else {
                const rows = Array.from(document.getElementById('tableBody').children);
                const opts = Array.from(document.getElementById('tableHeader').children).slice(1).map(th => th.innerText);
                const factors = rows.map(r => {
                    const inputs = r.querySelectorAll('input');
                    return { 
                        name: inputs[0].value || "未命名因素", 
                        weight: parseInt(inputs[1].value), 
                        scores: Array.from(inputs).slice(2).map(i => parseInt(i.value)) 
                    };
                });

                // 计算总分以便传给AI验证
                const totals = opts.map((_, i) => factors.reduce((acc, f) => acc + (f.weight * f.scores[i]), 0));
                chartData = { labels: factors.map(f => f.name), datasets: opts.map((name, i) => ({
                    label: name,
                    data: factors.map(f => f.scores[i]),
                    borderColor: i === 0 ? '#4ade80' : (i === 1 ? '#34d399' : '#059669'),
                    backgroundColor: 'rgba(74, 222, 128, 0.1)'
                }))};

                prompt = `执行WADM分析。
                数据：因素(${factors.map(f => f.name + '权重' + f.weight).join('|')})，选项(${opts.join('|')})。
                规则：
                1. 严格生成对比表格，包含评分及[权重*评分]结果。
                2. 计算总分。
                3. 若2选项输出“更好的选择”，若≥3选项输出“推荐选择”并按总分排名。
                4. 提供大数据总结及决策建议。
                5. 严禁特殊排版符号，保持极简文字。`;
            }

            try {
                const response = await fetch("https://api.deepseek.com/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: [{role: "user", content: prompt}],
                        temperature: 0.2
                    })
                });
                const data = await response.json();
                resContent.innerText = data.choices[0].message.content;
                resArea.classList.remove('hidden');

                if(currentModule === 'WADM' && chartData) {
                    renderChart(chartData);
                } else {
                    document.getElementById('chartSection').classList.add('hidden');
                }
                
                resArea.scrollIntoView({ behavior: 'smooth' });
            } catch (e) {
                resContent.innerText = "审计连接超时，请检查 API 配置。";
                resArea.classList.remove('hidden');
            } finally {
                btn.innerText = "执行逻辑审计分析";
                btn.disabled = false;
            }
        }

        function renderChart(data) {
            const ctx = document.getElementById('decisionChart').getContext('2d');
            document.getElementById('chartSection').classList.remove('hidden');
            if(chartInstance) chartInstance.destroy();
            
            chartInstance = new Chart(ctx, {
                type: 'radar',
                data: data,
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            angleLines: { color: 'rgba(74, 222, 128, 0.2)' },
                            grid: { color: 'rgba(74, 222, 128, 0.2)' },
                            pointLabels: { color: '#4ade80', font: { size: 12 } },
                            ticks: { display: false, max: 10, min: 0 }
                        }
                    },
                    plugins: {
                        legend: { labels: { color: '#4ade80', font: { family: 'Inter' } } }
                    }
                }
            });
        }
    </script>
</body>
</html>
